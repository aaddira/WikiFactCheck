{% extends "base.html" %}

{% block title %}Admin Login - WikiFactCheck{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-8">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Admin Access</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-6">
            Enter your secret token to access the admin panel.
        </p>

        {% if error %}
        <div class="bg-red-100 dark:bg-red-900 border border-red-500 dark:border-red-700 text-red-700 dark:text-red-200 p-4 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            <div>
                <label for="token" class="block text-sm font-semibold mb-2 text-gray-700 dark:text-gray-300">Secret Token</label>
                <input
                    type="password"
                    id="token"
                    name="token"
                    required
                    placeholder="Enter your secret token"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                    autocomplete="off"
                />
            </div>

            <button
                type="submit"
                class="w-full bg-emerald-600 text-white py-2 rounded-lg font-semibold hover:bg-emerald-700 transition"
            >
                Access Admin Panel
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
            <a href="/login" class="text-emerald-600 dark:text-emerald-400 hover:underline">Standard annotator login →</a>
        </p>
    </div>
</div>
{% endblock %}
