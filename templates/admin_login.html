{% extends "base.html" %}

{% block title %}Admin Login - WikiFactCheck{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white rounded-lg shadow p-8">
        <h1 class="text-2xl font-bold mb-2">Admin Access</h1>
        <p class="text-gray-600 mb-6">
            Enter your secret token to access the admin panel.
        </p>

        {% if error %}
        <div class="bg-red-100 border border-red-500 text-red-700 p-4 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            <div>
                <label for="token" class="block text-sm font-semibold mb-2 text-gray-700">Secret Token</label>
                <input
                    type="password"
                    id="token"
                    name="token"
                    required
                    placeholder="Enter your secret token"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    autocomplete="off"
                />
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition"
            >
                Access Admin Panel
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            <a href="/login" class="text-blue-600 hover:underline">Standard annotator login →</a>
        </p>
    </div>
</div>
{% endblock %}
