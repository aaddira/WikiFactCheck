<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WikiFactCheck Annotation Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50">
    {% if current_user %}
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-gray-900">WikiFactCheck</a>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-600">{{ current_user.email }}</span>
                    {% if current_user.is_admin %}
                    <a href="/admin" class="text-sm text-blue-600 hover:text-blue-800">Admin</a>
                    {% endif %}
                    <a href="/dashboard" class="text-sm text-blue-600 hover:text-blue-800">Dashboard</a>
                    <a href="/logout" class="text-sm text-gray-600 hover:text-gray-900">Logout</a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
