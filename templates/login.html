<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WikiFactCheck</title>

    <!-- Anti-FOUC: Prevent flash of wrong theme by reading theme before page renders -->
    <script>
        (function() {
            const stored = localStorage.getItem('theme');
            const theme = stored === 'light' || stored === 'dark' ? stored :
                         (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configure Tailwind for dark mode class-based detection -->
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-100 dark:from-gray-900 dark:to-gray-800 min-h-screen flex items-center justify-center">
    <!-- Theme Toggle Button (top-right) -->
    <div class="fixed top-4 right-4">
        <button onclick="toggleTheme()" class="p-2 rounded-lg bg-white dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-600 transition shadow-md" title="Toggle dark mode">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2 text-center">WikiFactCheck</h1>
        <p class="text-center text-gray-600 dark:text-gray-400 mb-8">Citation Support Labeling System</p>

        {% if error %}
        <div class="bg-red-50 dark:bg-red-900 border border-red-200 dark:border-red-700 text-red-700 dark:text-red-200 px-4 py-3 rounded-lg mb-6 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    autofocus
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                    placeholder="your@email.com"
                />
            </div>

            <div>
                <label for="wiki_username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Wikipedia Username</label>
                <input
                    type="text"
                    id="wiki_username"
                    name="wiki_username"
                    required
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                    placeholder="Your Wikipedia username"
                />
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">Required for leaderboard display. Can be changed later in Preferences.</p>
            </div>

            <button
                type="submit"
                class="w-full bg-emerald-600 text-white py-2 rounded-lg font-medium hover:bg-emerald-700 transition"
            >
                Sign In
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-700 text-center">
            <p class="text-xs text-gray-500 dark:text-gray-400 mb-3">
                Don't have an account?
                <a href="{{ url_for('register_page') }}" class="text-emerald-600 dark:text-emerald-400 font-semibold hover:underline">
                    Sign up here
                </a>
            </p>
            <p class="text-xs text-gray-500 dark:text-gray-400">
                This is a trusted internal tool for a small team of annotators.
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script>
        // Update theme icon based on current theme
        function updateThemeIcon() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.textContent = isDark ? '☀️' : '🌙';
            }
        }
        updateThemeIcon();
        document.addEventListener('themechange', updateThemeIcon);
    </script>
</body>
</html>
