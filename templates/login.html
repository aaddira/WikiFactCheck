<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WikiFactCheck</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-lg p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">WikiFactCheck</h1>
        <p class="text-center text-gray-600 mb-8">Citation Support Labeling System</p>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    autofocus
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                    placeholder="your@email.com"
                />
            </div>

            <div>
                <label for="wiki_username" class="block text-sm font-medium text-gray-700 mb-2">Wikipedia Username</label>
                <input
                    type="text"
                    id="wiki_username"
                    name="wiki_username"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
                    placeholder="Your Wikipedia username"
                />
                <p class="text-xs text-gray-500 mt-1">Required for leaderboard display. Can be changed later in Preferences.</p>
            </div>

            <button
                type="submit"
                class="w-full bg-emerald-600 text-white py-2 rounded-lg font-medium hover:bg-emerald-700 transition"
            >
                Sign In
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-gray-200">
            <p class="text-xs text-gray-500 text-center">
                This is a trusted internal tool for a small team of annotators.
                Enter your email to begin.
            </p>
        </div>
    </div>
</body>
</html>
